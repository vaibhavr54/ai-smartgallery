<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI SmartGallery{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-deep:     #050810;
            --bg-mid:      #0a0f1e;
            --glass:       rgba(255,255,255,0.05);
            --glass-hover: rgba(255,255,255,0.09);
            --border:      rgba(255,255,255,0.10);
            --accent:      #6c63ff;
            --accent-2:    #00d4ff;
            --accent-glow: rgba(108,99,255,0.35);
            --text-bright: #f0f4ff;
            --text-muted:  rgba(240,244,255,0.5);
            --danger:      #ff4f6d;
            --success:     #00e5a0;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-deep);
            color: var(--text-bright);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Animated mesh background ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 10% 10%,  rgba(108,99,255,0.18) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 90% 80%,  rgba(0,212,255,0.12)  0%, transparent 55%),
                radial-gradient(ellipse 50% 40% at 50% 50%,  rgba(108,99,255,0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* ── Navbar ── */
        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2.5rem;
            height: 64px;
            background: rgba(5,8,16,0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .nav-logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.25rem;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            list-style: none;
        }

        .nav-links a {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.45rem 1rem;
            border-radius: 8px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            transition: color 0.2s, background 0.2s;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--text-bright);
            background: var(--glass-hover);
        }

        .nav-links a.btn-primary {
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            color: #fff;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .nav-links a.btn-primary:hover {
            box-shadow: 0 0 30px var(--accent-glow);
            transform: translateY(-1px);
        }

        /* ── Page wrapper ── */
        .page { position: relative; z-index: 1; padding: 2.5rem; max-width: 1400px; margin: 0 auto; }

        /* ── Glass card ── */
        .glass-card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 16px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: background 0.2s, border-color 0.2s, transform 0.2s;
        }

        .glass-card:hover {
            background: var(--glass-hover);
            border-color: rgba(255,255,255,0.16);
        }

        /* ── Page heading ── */
        .page-heading {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: clamp(1.8rem, 3vw, 2.6rem);
            letter-spacing: -0.03em;
            margin-bottom: 0.4rem;
        }

        .page-heading span {
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .page-subheading {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        /* ── Pill badge ── */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.2rem 0.7rem;
            border-radius: 999px;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .badge-purple { background: rgba(108,99,255,0.2); color: #a89aff; border: 1px solid rgba(108,99,255,0.3); }
        .badge-cyan   { background: rgba(0,212,255,0.15); color: #67e8f9; border: 1px solid rgba(0,212,255,0.25); }
        .badge-green  { background: rgba(0,229,160,0.15); color: #6ee7b7; border: 1px solid rgba(0,229,160,0.25); }
        .badge-red    { background: rgba(255,79,109,0.15); color: #fca5a5; border: 1px solid rgba(255,79,109,0.25); }

        /* ── Buttons ── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.6rem 1.4rem;
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            font-size: 0.875rem;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .btn-accent {
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            color: #fff;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .btn-accent:hover { transform: translateY(-2px); box-shadow: 0 4px 30px var(--accent-glow); }

        .btn-ghost {
            background: var(--glass);
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .btn-ghost:hover { background: var(--glass-hover); color: var(--text-bright); }

        .btn-danger { background: rgba(255,79,109,0.15); color: var(--danger); border: 1px solid rgba(255,79,109,0.3); }
        .btn-danger:hover { background: rgba(255,79,109,0.25); }

        /* ── Stat cards row ── */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            padding: 1.2rem 1.4rem;
            border-radius: 14px;
        }

        .stat-label {
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
        }

        .stat-value {
            font-family: 'Syne', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            line-height: 1;
        }

        /* ── Divider ── */
        .divider {
            height: 1px;
            background: var(--border);
            margin: 2rem 0;
        }

        /* ── Toast notifications ── */
        #toast-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .toast {
            padding: 0.8rem 1.2rem;
            border-radius: 10px;
            font-size: 0.875rem;
            background: var(--glass);
            border: 1px solid var(--border);
            backdrop-filter: blur(16px);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 99px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

        /* ── Responsive ── */
        @media (max-width: 640px) {
            nav { padding: 0 1rem; }
            .page { padding: 1.5rem 1rem; }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>

<nav>
    <a href="{% url 'gallery' %}" class="nav-logo">⚡ SmartGallery</a>
    <ul class="nav-links">
        <li><a href="{% url 'gallery' %}">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
            Gallery
        </a></li>
        <li><a href="{% url 'people_view' %}">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
            People
        </a></li>
        <li><a href="{% url 'visual_search' %}">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            Search
        </a></li>
        <li><a href="{% url 'rescan' %}">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
            Rescan
        </a></li>
        <li><a href="{% url 'upload_photo' %}" class="btn-primary">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            Upload
        </a></li>
    </ul>
</nav>

<div id="toast-container"></div>

<main class="page">
    {% block content %}{% endblock %}
</main>

<script>
    // Highlight active nav link
    document.querySelectorAll('.nav-links a').forEach(a => {
        if (a.href === window.location.href) a.classList.add('active');
    });

    // Toast helper (call from any page)
    function showToast(msg, type='info') {
        const t = document.createElement('div');
        t.className = 'toast';
        t.style.borderColor = type === 'success' ? 'rgba(0,229,160,0.3)' : type === 'error' ? 'rgba(255,79,109,0.3)' : 'rgba(255,255,255,0.1)';
        t.textContent = msg;
        document.getElementById('toast-container').appendChild(t);
        setTimeout(() => t.remove(), 3500);
    }
</script>

{% block extra_scripts %}{% endblock %}
</body>
</html>
