<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI SmartGallery{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-deep:     #050810;
            --bg-mid:      #0a0f1e;
            --glass:       rgba(255,255,255,0.05);
            --glass-hover: rgba(255,255,255,0.09);
            --border:      rgba(255,255,255,0.10);
            --accent:      #6c63ff;
            --accent-2:    #00d4ff;
            --accent-glow: rgba(108,99,255,0.35);
            --text-bright: #f0f4ff;
            --text-muted:  rgba(240,244,255,0.5);
            --danger:      #ff4f6d;
            --success:     #00e5a0;
            --nav-height:  64px;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-deep);
            color: var(--text-bright);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 10% 10%,  rgba(108,99,255,0.18) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 90% 80%,  rgba(0,212,255,0.12)  0%, transparent 55%),
                radial-gradient(ellipse 50% 40% at 50% 50%,  rgba(108,99,255,0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* ══ NAVBAR ══ */
        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            height: var(--nav-height);
            background: rgba(5,8,16,0.80);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .nav-logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.2rem;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
            flex-shrink: 0;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            list-style: none;
        }

        .nav-links a {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.4rem 0.85rem;
            border-radius: 8px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: color 0.2s, background 0.2s;
            white-space: nowrap;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--text-bright);
            background: var(--glass-hover);
        }

        .nav-links a.btn-primary {
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            color: #fff;
            box-shadow: 0 0 20px var(--accent-glow);
            margin-left: 0.25rem;
        }

        .nav-links a.btn-primary:hover {
            box-shadow: 0 0 30px var(--accent-glow);
            transform: translateY(-1px);
        }

        /* ══ HAMBURGER ══ */
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 8px;
            border: none;
            background: none;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .hamburger:hover { background: var(--glass); }

        .hamburger span {
            display: block;
            width: 22px;
            height: 2px;
            background: var(--text-bright);
            border-radius: 99px;
            transition: all 0.3s ease;
        }

        .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        .hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
        .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

        /* ══ MOBILE DRAWER ══ */
        .mobile-menu {
            display: none;
            position: fixed;
            top: var(--nav-height);
            left: 0; right: 0;
            background: rgba(5,8,16,0.97);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem;
            z-index: 99;
            flex-direction: column;
            gap: 0.2rem;
            animation: slideDown 0.2s ease;
        }

        .mobile-menu.open { display: flex; }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .mobile-menu a {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.8rem 1rem;
            border-radius: 10px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .mobile-menu a:hover, .mobile-menu a.active {
            color: var(--text-bright);
            background: var(--glass-hover);
        }

        .mobile-menu a.btn-primary {
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            color: #fff;
            margin-top: 0.4rem;
            justify-content: center;
        }

        /* ══ PAGE ══ */
        .page {
            position: relative;
            z-index: 1;
            padding: 2.5rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ══ GLASS CARD ══ */
        .glass-card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 16px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: background 0.2s, border-color 0.2s;
        }

        .glass-card:hover {
            background: var(--glass-hover);
            border-color: rgba(255,255,255,0.16);
        }

        /* ══ TYPOGRAPHY ══ */
        .page-heading {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: clamp(1.5rem, 3vw, 2.6rem);
            letter-spacing: -0.03em;
            margin-bottom: 0.4rem;
        }

        .page-heading span {
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .page-subheading {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        /* ══ BADGES ══ */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.2rem 0.7rem;
            border-radius: 999px;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .badge-purple { background: rgba(108,99,255,0.2); color: #a89aff; border: 1px solid rgba(108,99,255,0.3); }
        .badge-cyan   { background: rgba(0,212,255,0.15); color: #67e8f9; border: 1px solid rgba(0,212,255,0.25); }
        .badge-green  { background: rgba(0,229,160,0.15); color: #6ee7b7; border: 1px solid rgba(0,229,160,0.25); }
        .badge-red    { background: rgba(255,79,109,0.15); color: #fca5a5; border: 1px solid rgba(255,79,109,0.25); }

        /* ══ BUTTONS ══ */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.6rem 1.4rem;
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            font-size: 0.875rem;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .btn-accent {
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            color: #fff;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .btn-accent:hover { transform: translateY(-2px); box-shadow: 0 4px 30px var(--accent-glow); }

        .btn-ghost {
            background: var(--glass);
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .btn-ghost:hover { background: var(--glass-hover); color: var(--text-bright); }

        .btn-danger { background: rgba(255,79,109,0.15); color: var(--danger); border: 1px solid rgba(255,79,109,0.3); }
        .btn-danger:hover { background: rgba(255,79,109,0.25); }

        /* ══ STATS ROW ══ */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card { padding: 1.2rem 1.4rem; border-radius: 14px; }

        .stat-label {
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
        }

        .stat-value {
            font-family: 'Syne', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            line-height: 1;
        }

        /* ══ MISC ══ */
        .divider { height: 1px; background: var(--border); margin: 2rem 0; }

        /* ══ TOAST ══ */
        #toast-container {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .toast {
            padding: 0.8rem 1.2rem;
            border-radius: 10px;
            font-size: 0.875rem;
            background: var(--glass);
            border: 1px solid var(--border);
            backdrop-filter: blur(16px);
            animation: slideIn 0.3s ease;
            max-width: 300px;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        /* ══ SCROLLBAR ══ */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 99px; }

        /* ════════════════════════════
           RESPONSIVE BREAKPOINTS
        ════════════════════════════ */

        /* Tablet */
        @media (max-width: 900px) {
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .page { padding: 2rem 1.5rem; }
        }

        /* Mobile — hide desktop nav, show hamburger */
        @media (max-width: 680px) {
            nav { padding: 0 1rem; }
            .nav-links { display: none; }
            .hamburger { display: flex; }

            .page { padding: 1.25rem 1rem; }

            .stats-row {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.75rem;
            }

            .stat-value { font-size: 1.7rem; }
            .stat-card  { padding: 1rem; }

            .page-subheading { font-size: 0.85rem; margin-bottom: 1.25rem; }

            /* Stack toolbar */
            .toolbar {
                flex-direction: column !important;
                align-items: stretch !important;
                gap: 0.75rem !important;
            }

            .toolbar > div {
                display: flex;
                gap: 0.5rem;
            }

            .toolbar .btn {
                flex: 1;
                justify-content: center;
                font-size: 0.8rem;
                padding: 0.5rem 0.75rem;
            }

            /* Filter tabs scroll on mobile */
            .filter-tabs {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }

            #toast-container { left: 1rem; right: 1rem; bottom: 1rem; }
            .toast { max-width: 100%; }
        }

        /* Small phones */
        @media (max-width: 400px) {
            .stat-label { font-size: 0.62rem; }
            .stat-value { font-size: 1.4rem; }
            .stats-row  { gap: 0.5rem; }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>

            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>

        </a></li>
        <li><a href="{% url 'batch_upload' %}" class="btn-primary">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            Upload
        </a></li>
    </ul>

    <!-- Hamburger -->
    <button class="hamburger" id="hamburger" aria-label="Toggle menu">
        <span></span><span></span><span></span>
    </button>
</nav>

<!-- Mobile drawer -->
<div class="mobile-menu" id="mobile-menu">
    <a href="{% url 'gallery' %}">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Gallery
    </a>
    <a href="{% url 'people_view' %}">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        People
    </a>
    <a href="{% url 'events_view' %}">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Events
    </a>
    <a href="{% url 'enhance' %}">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        Enhance
    </a>
    <a href="{% url 'collage' %}">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Collage
    </a>
    <a href="{% url 'nl_search' %}">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        Smart Search
    </a>
    <a href="{% url 'rescan' %}">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        Rescan
    </a>
    <a href="{% url 'batch_upload' %}" class="btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Upload Photos
    </a>
</div>

<div id="toast-container"></div>

<main class="page">
    {% block content %}{% endblock %}
</main>

<script>
    // Active nav
    const path = window.location.pathname;
    document.querySelectorAll('.nav-links a, .mobile-menu a').forEach(a => {
        if (a.getAttribute('href') === path) a.classList.add('active');
    });

    // Hamburger
    const hamburger  = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobile-menu');
    const mainNav    = document.getElementById('main-nav');

    hamburger.addEventListener('click', e => {
        e.stopPropagation();
        hamburger.classList.toggle('open');
        mobileMenu.classList.toggle('open');
    });

    mobileMenu.querySelectorAll('a').forEach(a => {
        a.addEventListener('click', () => {
            hamburger.classList.remove('open');
            mobileMenu.classList.remove('open');
        });
    });

    document.addEventListener('click', e => {
        if (!mainNav.contains(e.target) && !mobileMenu.contains(e.target)) {
            hamburger.classList.remove('open');
            mobileMenu.classList.remove('open');
        }
    });

    // Toast
    function showToast(msg, type='info') {
        const t = document.createElement('div');
        t.className = 'toast';
        t.style.borderColor = type === 'success' ? 'rgba(0,229,160,0.3)' : type === 'error' ? 'rgba(255,79,109,0.3)' : 'rgba(255,255,255,0.1)';
        t.textContent = msg;
        document.getElementById('toast-container').appendChild(t);
        setTimeout(() => t.remove(), 3500);
    }
</script>

{% block extra_scripts %}{% endblock %}
</body>
</html>
